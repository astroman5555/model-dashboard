<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Model Comparison Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f12;
    --surface: #161820;
    --surface2: #1e2028;
    --border: #2a2d38;
    --text: #e8eaf0;
    --text-muted: #7a7e91;
    --accent: #4f8ef7;
    --zup:  #34d399;
    --zip:  #f59e0b;
    --zap:  #f87171;
    --base: #a78bfa;
    --win-bg: rgba(52,211,153,0.08);
    --win-border: rgba(52,211,153,0.35);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 24px 28px 48px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header .sub { color: var(--text-muted); font-size: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* ── Chart ── */
  .chart-wrap {
    position: relative;
    height: 380px;
  }

  /* ── Legend toggle pills ── */
  .legend-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .legend-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    user-select: none;
    transition: opacity 0.15s, border-color 0.15s;
    background: var(--surface2);
  }
  .legend-pill.off { opacity: 0.35; }
  .legend-pill .dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    min-width: 180px;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #tooltip .tt-date {
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  #tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 2px 0;
  }
  #tooltip .tt-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
  }
  #tooltip .tt-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  #tooltip .tt-val { font-weight: 600; }
  #tooltip .tt-val.pos { color: #34d399; }
  #tooltip .tt-val.neg { color: #f87171; }

  /* ── Table ── */
  .tbl-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    padding: 8px 14px;
    text-align: right;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.winner {
    background: var(--win-bg);
    border-color: var(--win-border);
  }
  tbody tr.winner td:first-child {
    border-left: 3px solid var(--zup);
    padding-left: 11px;
  }
  tbody td {
    padding: 10px 14px;
    text-align: right;
    white-space: nowrap;
  }
  tbody td:first-child { text-align: left; font-weight: 600; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: rgba(52,211,153,0.15);
    color: var(--zup);
    margin-left: 6px;
    vertical-align: middle;
  }
  .pos { color: #34d399; }
  .neg { color: #f87171; }
  .neutral { color: var(--text); }
</style>
</head>
<body>

<header>
  <h1>Stock Model Dashboard</h1>
  <span class="sub">ZIP · ZAP · ZUP · BASELINE &nbsp;|&nbsp; Backtest comparison</span>
</header>

<div class="card">
  <div class="card-title">Cumulative Return (%)</div>
  <div class="legend-row" id="legendRow"></div>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<div class="card">

          <th>Max DD</th>
          <th>Avg Daily Ret</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

// ── Colours ──────────────────────────────────────────────
const COLORS = {
  ZUP:      '#34d399',
  ZIP:      '#f59e0b',
  ZAP:      '#f87171',
  BASELINE: '#a78bfa',
};
const MODEL_ORDER = ['ZUP', 'ZIP', 'ZAP', 'BASELINE'];

// ── Compute cumulative returns ────────────────────────────
function cumulativeReturns(records) {
  let cum = 0;
  return records.map(r => {
    cum = (1 + cum / 100) * (1 + r.return_pct / 100) * 100 - 100;
    return { date: r.date, cum: parseFloat(cum.toFixed(4)) };
  });
}

// ── Compute stats ─────────────────────────────────────────
function computeStats(records) {
  const n = records.length;
  const rets = records.map(r => r.return_pct);

  // Accuracy
  const correct = records.filter(r => r.spy_correct).length;
  const acc = (correct / n * 100).toFixed(1);

  // OOS accuracy (last 40% of records)
  const oosStart = Math.floor(n * 0.6);
  const oosRecs = records.slice(oosStart);
  const oosCorrect = oosRecs.filter(r => r.spy_correct).length;
  const oosAcc = oosRecs.length > 0 ? (oosCorrect / oosRecs.length * 100).toFixed(1) : 'N/A';

  // Total return
  let capital = 1;
  for (const r of rets) capital *= (1 + r / 100);
  const totalRet = ((capital - 1) * 100).toFixed(2);

  // Avg daily return
  const mean = rets.reduce((a, b) => a + b, 0) / n;
  const avgDaily = mean.toFixed(3);

  // Sharpe (annualised, assuming 252 trading days)
  const variance = rets.reduce((a, b) => a + (b - mean) ** 2, 0) / n;
  const std = Math.sqrt(variance);
  const sharpe = std > 0 ? ((mean / std) * Math.sqrt(252)).toFixed(2) : 'N/A';

  // Max drawdown
  let peak = 1, cum2 = 1, maxDD = 0;
  for (const r of rets) {
    cum2 *= (1 + r / 100);
    if (cum2 > peak) peak = cum2;
    const dd = (cum2 - peak) / peak * 100;
    if (dd < maxDD) maxDD = dd;
  }
  const maxDDStr = maxDD.toFixed(2);

  return { acc, oosAcc, totalRet, sharpe, maxDD: maxDDStr, avgDaily, n };
}

// ── Build chart dataset ───────────────────────────────────
// Merge all dates across models
const allDatesSet = new Set();
for (const m of MODEL_ORDER) {
  for (const r of RAW_DATA[m]) allDatesSet.add(r.date);
}
const allDates = [...allDatesSet].sort();

// Build per-model cumulative lookup
const cumByModel = {};
for (const m of MODEL_ORDER) {
  const series = cumulativeReturns(RAW_DATA[m]);
  const lookup = {};
  for (const pt of series) lookup[pt.date] = pt.cum;
  cumByModel[m] = lookup;
}

// Build chart datasets (null for dates before model starts)
const datasets = MODEL_ORDER.map(m => {
  const data = allDates.map(d => cumByModel[m][d] !== undefined ? cumByModel[m][d] : null);
  return {
    label: m,
    data,
    borderColor: COLORS[m],
    backgroundColor: 'transparent',
    borderWidth: m === 'ZUP' ? 2.5 : 1.8,
    pointRadius: 0,
    pointHoverRadius: 0,
    tension: 0.2,
    spanGaps: false,
    hidden: false,
  };
});

// ── Build legend pills ────────────────────────────────────
const legendRow = document.getElementById('legendRow');
const pillMap = {};
MODEL_ORDER.forEach(m => {
  const pill = document.createElement('div');
  pill.className = 'legend-pill';
  pill.innerHTML = `<span class="dot" style="background:${COLORS[m]}"></span>${m}`;
  pill.dataset.model = m;
  legendRow.appendChild(pill);
  pillMap[m] = pill;
  pill.addEventListener('click', () => {
    const idx = MODEL_ORDER.indexOf(m);
    const ds = chart.data.datasets[idx];
    ds.hidden = !ds.hidden;
    pill.classList.toggle('off', ds.hidden);
    chart.update('none');
  });
});

// ── Render chart ──────────────────────────────────────────
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { labels: allDates, datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    animation: { duration: 400 },
    plugins: {
      legend: { display: false },
      tooltip: {
        enabled: false,
        external: externalTooltip,
      },
    },
    scales: {
      x: {
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: {
          color: '#7a7e91',
          maxTicksLimit: 10,
          maxRotation: 0,
          font: { size: 11 },
          callback: function(val, idx) {
            const d = allDates[idx];
            if (!d) return '';
            // Show month/year ticks
            return d.slice(0, 7); // YYYY-MM
          },
        },
        border: { color: '#2a2d38' },
      },
      y: {
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: {
          color: '#7a7e91',
          font: { size: 11 },
          callback: v => v.toFixed(0) + '%',
        },
        border: { color: '#2a2d38' },
      },
    },
  },
});

// ── External tooltip ──────────────────────────────────────
const ttEl = document.getElementById('tooltip');

function externalTooltip(context) {
  const { chart: ch, tooltip } = context;
  if (tooltip.opacity === 0 || !tooltip.dataPoints || !tooltip.dataPoints.length) { ttEl.style.display = 'none'; return; }

  const date = allDates[tooltip.dataPoints[0].dataIndex];

  let html = `<div class="tt-date">${date}</div>`;
  // Show each visible dataset
  for (const dp of tooltip.dataPoints) {
    const m = dp.dataset.label;
    const val = dp.raw;
    if (val === null || val === undefined) continue;
    const cls = val >= 0 ? 'pos' : 'neg';
    const sign = val >= 0 ? '+' : '';
    html += `<div class="tt-row">
      <span class="tt-label"><span class="tt-dot" style="background:${COLORS[m]}"></span>${m}</span>
      <span class="tt-val ${cls}">${sign}${val.toFixed(2)}%</span>
    </div>`;
  }

  ttEl.innerHTML = html;
  ttEl.style.display = 'block';

  const canvasRect = ch.canvas.getBoundingClientRect();
  let x = canvasRect.left + tooltip.caretX + 16;
  let y = canvasRect.top + tooltip.caretY - 20;

  // Keep inside viewport
  const tw = ttEl.offsetWidth || 200;
  const th = ttEl.offsetHeight || 120;
  if (x + tw > window.innerWidth - 8) x = canvasRect.left + tooltip.caretX - tw - 16;
  if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
  if (y < 8) y = 8;

  ttEl.style.left = x + 'px';
  ttEl.style.top  = y + 'px';
}

// Hide tooltip when mouse leaves canvas
document.getElementById('chart').addEventListener('mouseleave', () => {
  ttEl.style.display = 'none';
});

// ── Build stats table ─────────────────────────────────────
const tbody = document.querySelector('#statsTable tbody');

MODEL_ORDER.forEach(m => {
  const stats = computeStats(RAW_DATA[m]);
  const isWinner = m === 'ZUP';
  const tr = document.createElement('tr');
  if (isWinner) tr.className = 'winner';

  const retVal = parseFloat(stats.totalRet);
  const retCls = retVal >= 0 ? 'pos' : 'neg';
  const retSign = retVal >= 0 ? '+' : '';

  const avgVal = parseFloat(stats.avgDaily);
  const avgCls = avgVal >= 0 ? 'pos' : 'neg';
  const avgSign = avgVal >= 0 ? '+' : '';

  const ddVal = parseFloat(stats.maxDD);
  const ddCls = ddVal <= -10 ? 'neg' : ddVal <= -5 ? 'neutral' : 'pos';

  const sharpeVal = parseFloat(stats.sharpe);
  const sharpeCls = sharpeVal >= 2 ? 'pos' : sharpeVal >= 1 ? 'neutral' : 'neg';

  const nameCell = isWinner
    ? `${m}<span class="badge">WINNER</span>`
    : m;

  tr.innerHTML = `
    <td><span style="color:${COLORS[m]}">${nameCell}</span></td>
    <td class="neutral">${stats.n}</td>
    <td class="neutral">${stats.acc}%</td>
    <td class="neutral">${stats.oosAcc}%</td>
    <td class="${retCls}">${retSign}${stats.totalRet}%</td>
    <td class="${sharpeCls}">${stats.sharpe}</td>
    <td class="${ddCls}">${stats.maxDD}%</td>
    <td class="${avgCls}">${avgSign}${stats.avgDaily}%</td>
  `;
  tbody.appendChild(tr);
});
</script>
